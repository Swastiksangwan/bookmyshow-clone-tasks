    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect x="95" y="160" width="410" height="250" rx="22" fill="#f8f9fa" opacity=".9"/>
  <rect x="125" y="200" width="350" height="36" fill="#343a40" opacity=".25"/>
  <rect x="125" y="270" width="350" height="36" fill="#343a40" opacity=".25"/>
  <rect x="125" y="340" width="350" height="36" fill="#343a40" opacity=".25"/>
  <circle cx="180" cy="555" r="70" fill="#f8f9fa" opacity=".9"/>
  <circle cx="300" cy="555" r="70" fill="#f8f9fa" opacity=".9"/>
  <circle cx="420" cy="555" r="70" fill="#f8f9fa" opacity=".9"/>
