  <text x="50" y="782" fill="#ffffff" font-family="Arial, sans-serif" font-size="58" font-weight="900">Big Buck</text>
  <text x="50" y="842" fill="#ffffff" font-family="Arial, sans-serif" font-size="58" font-weight="900">Bunny</text>
