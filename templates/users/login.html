{% extends "users/basic.html" %}

{% block title %}Login | BookMySeat{% endblock %}

{% block content %}
<section class="auth-page py-4">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
      <div class="app-card detail-panel">
        <h1 class="h3 mb-2">Log In</h1>
        <p class="text-muted mb-4">Access your bookings and continue reserved seats.</p>

        <form method="POST" action="{% url 'login' %}">
          {% csrf_token %}
          <div class="form-group">
            <label for="{{ form.username.id_for_label }}">Username</label>
            {{ form.username }}
          </div>

          <div class="form-group">
            <label for="{{ form.password.id_for_label }}">Password</label>
            <div class="input-group">
              {{ form.password }}
              <div class="input-group-append">
                <button class="btn btn-outline-secondary" type="button" id="togglePassword" aria-label="Show or hide password">
                  <i class="fas fa-eye" id="toggleIcon"></i>
                </button>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            Login
          </button>
        </form>

        <div class="auth-footer mt-4 pt-3">
          <a href="{% url 'password_reset' %}">Forgot Password?</a>
          <span class="mx-2 text-muted">|</span>
          <a href="{% url 'register' %}">Create an account</a>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    var togglePassword = document.getElementById("togglePassword");
    var passwordField = document.getElementById("{{ form.password.id_for_label }}");
    var toggleIcon = document.getElementById("toggleIcon");

    if (!togglePassword || !passwordField) {
      return;
    }

    togglePassword.addEventListener("click", function() {
      var type = passwordField.getAttribute("type") === "password" ? "text" : "password";
      passwordField.setAttribute("type", type);
      toggleIcon.classList.toggle("fa-eye");
      toggleIcon.classList.toggle("fa-eye-slash");
    });
  });
</script>
{% endblock %}
